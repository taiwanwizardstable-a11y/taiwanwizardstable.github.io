<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Common Room | 2026.5.30</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Noto+Serif+TC:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    color:#f5f5f5;
    font-family:"Noto Serif TC", serif;

    background-image:
    linear-gradient(
    rgba(0,0,0,.55),
    rgba(0,0,0,.88)
    ),
    url("IMG_0580.png");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.container{
    width:min(900px,92%);
    margin:80px auto;
}

.entry-card{
    background:rgba(0,0,0,.45);
    border:1px solid rgba(212,175,55,.35);
    border-radius:28px;
    padding:40px;
    backdrop-filter:blur(4px);
}

.date{
    text-align:center;
    font-family:"Cinzel", serif;
    font-size:2.4rem;
    letter-spacing:.08em;
    color:#d4af37;
    margin-bottom:40px;
}

.photo{
    width:100%;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:40px;
    border:1px solid rgba(212,175,55,.35);
}

.photo img{
    display:block;
    width:100%;
}

.section-title{
    font-family:"Cinzel", serif;
    color:#d4af37;
    letter-spacing:.15em;
    text-transform:uppercase;
    text-align:center;
    margin-bottom:15px;
}

.people{
    text-align:center;
    margin-bottom:35px;
}

.people span{
    display:inline-block;
    margin:6px;
    padding:8px 16px;
    border-radius:999px;
    font-size:.95rem;
}

.ravenclaw{
    color:#c7dcff;
    background:rgba(20,45,80,.55);
    border:1px solid rgba(80,130,200,.6);
}

.hufflepuff{
    color:#ffe49c;
    background:rgba(92,75,20,.55);
    border:1px solid rgba(212,175,55,.6);
}

.gryffindor{
    color:#ffb7a7;
    background:rgba(95,20,20,.55);
    border:1px solid rgba(190,70,70,.6);
}

.reel-section{
    text-align:center;
}

.reel-button{
    display:inline-block;
    text-decoration:none;
    color:#d4af37;
    font-family:"Cinzel", serif;
    border:1px solid rgba(212,175,55,.6);
    padding:14px 32px;
    border-radius:999px;
    transition:.3s;
}

.reel-button:hover{
    background:rgba(212,175,55,.12);
}

.back-link{
    text-align:center;
    margin-top:40px;
}

.back-link a{
    color:#c9c9c9;
    text-decoration:none;
}

.back-link a:hover{
    color:#d4af37;
}

</style>
</head>

<body>

<div class="container">

    <div class="entry-card">

        <div class="date">
            2026.5.30
        </div>

        <div class="photo">
            <img src="https://i.ibb.co/gZGSws2Y/IMG-0602.jpg" alt="Common Room Gathering">
        </div>

        <div class="section-title">
            Host
        </div>

        <div class="people">
            <span class="ravenclaw">芋圓</span>
        </div>

        <div class="section-title">
            Those Present
        </div>

        <div class="people">
            <span class="hufflepuff">小屋</span>
            <span class="ravenclaw">Emily Ashworth</span>
            <span class="gryffindor">Freya小魚</span>
            <span class="ravenclaw">喵喵</span>
        </div>

        <div class="reel-section">
            <a class="reel-button"
               href="https://www.instagram.com/reel/DY9ZtzezeMe/?igsh=MTZ0eDl1Ym1vNWJleQ=="
               target="_blank">
               Watch Reel
            </a>
        </div>

        <div class="back-link">
            <a href="common-room.html">← Back to Common Room</a>
        </div>

    </div>

</div>

<script>

document.addEventListener("contextmenu", function(e){
  e.preventDefault();
});

document.addEventListener("dragstart", function(e){
  e.preventDefault();
});

</script>

</body>
</html>
